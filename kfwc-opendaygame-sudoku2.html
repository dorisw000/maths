<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>嘉福榮真 數獨挑戰 🌟</title>
    <style>
        :root {
            --bg-color: #f0fdf4;
            --panel-bg: #ffffff;
            --primary-color: #ff9800;
            --text-color: #334155;
            --cell-border: #fed7aa;
            --block-border: #f97316;
            --locked-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            padding: 15px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 新增：防止畫面縮放時出現多餘的滾動條 */
            overflow: hidden; 
        }

        #game-container {
            width: 100%;
            max-width: 440px;
            background: var(--panel-bg);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 5px solid #bbf7d0;
        }

        /* 頂部控制列 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        h1 {
            font-size: 1.6rem;
            color: #16a34a;
            text-shadow: 1px 1px 0px #dcfce7;
        }

        .level-indicator {
            font-size: 1.1rem;
            font-weight: bold;
            background: #dcfce7;
            padding: 8px 16px;
            border-radius: 16px;
            color: #15803d;
        }

        .btn {
            background: #f43f5e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #be123c;
            transition: all 0.1s ease;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #be123c;
        }

        /* 數獨主網格 */
        #sudoku-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border: 6px solid var(--block-border);
            border-radius: 24px;
            background: var(--block-border);
            overflow: hidden;
            margin-bottom: 22px;
            box-shadow: 0 8px 16px rgba(249, 115, 22, 0.15);
        }

        .grid-cell {
            aspect-ratio: 1;
            background: white;
            border: 2px solid var(--cell-border);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        /* 2x2 宮格粗邊框加強區隔 */
        .grid-cell[data-col="1"] { border-right: 6px solid var(--block-border); }
        .grid-cell[data-row="1"] { border-bottom: 6px solid var(--block-border); }

        /* 預設鎖定格子（題目） */
        .grid-cell.locked {
            background-color: var(--locked-bg);
            cursor: not-allowed;
        }

        /* 拖曳中懸停在格子上的效果 */
        .grid-cell.drag-hover {
            background-color: #fef08a;
        }

        /* 核心圖案容器（防破圖保險機制） */
        .graphic-box {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* 幼兒溫和色彩與文字圖卡設計 */
        .box-1 { background-color: #fef08a; color: #a16207; border: 2px solid #fde047; }
        .box-2 { background-color: #fee2e2; color: #b91c1c; border: 2px solid #fca5a5; }
        .box-3 { background-color: #ffedd5; color: #c2410c; border: 2px solid #fed7aa; }
        .box-4 { background-color: #e0f2fe; color: #0369a1; border: 2px solid #bae6fd; }

        .box-emoji { font-size: 1.1rem; margin-bottom: 1px; }
        .box-label { font-size: 1.3rem; letter-spacing: 1px; }

        /* 真正實體圖片 */
        .graphic-box img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            z-index: 5;
            border-radius: 14px;
            pointer-events: none;
        }

        /* 底部工具列 */
        #toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eff6ff;
            padding: 14px;
            border-radius: 24px;
            border: 3px dashed #3b82f6;
        }

        .tool-item {
            width: 66px; height: 66px;
            background: white;
            border-radius: 18px;
            cursor: grab;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 2px;
            position: relative;
        }

        .tool-item.eraser .graphic-box {
            background-color: #f1f5f9; color: #64748b; border: 2px dashed #cbd5e1;
        }

        .tool-item:hover, .tool-item.dragging, .tool-item.active-selected {
            transform: scale(1.18);
            box-shadow: 0 0 0 4px #f97316, 0 12px 20px rgba(249, 115, 22, 0.3);
            cursor: grabbing; z-index: 10;
        }

        .hint-text {
            font-size: 0.95rem; color: #64748b; margin-top: 12px; font-weight: bold;
        }

        /* 通關慶祝 與 鼓勵彈窗 共用樣式 */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 28px;
        }
        .overlay.show { transform: translateY(0); }

        .overlay-title {
            font-size: 2rem; margin-bottom: 24px; font-weight: bold; line-height: 1.4;
        }

        /* 成功綠色調 */
        .win-title { color: #10b981; animation: popPulse 0.5s ease-out forwards, bounce 0.6s infinite alternate 0.5s; }
        .btn-next { background: #10b981; box-shadow: 0 5px 0 #047857; font-size: 1.3rem; padding: 12px 36px; border-radius: 20px; color: white; border: none; cursor: pointer; }
        .btn-next:active { box-shadow: 0 1px 0 #047857; transform: translateY(4px); }

        /* 鼓勵橙黃色調 */
        .encourage-title { color: #f59e0b; animation: popPulse 0.5s ease-out forwards; font-size: 1.6rem; }
        .btn-try-again { background: #f59e0b; box-shadow: 0 5px 0 #b45309; font-size: 1.3rem; padding: 12px 36px; border-radius: 20px; color: white; border: none; cursor: pointer; }
        .btn-try-again:active { box-shadow: 0 1px 0 #b45309; transform: translateY(4px); }

        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes popPulse { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <button class="btn" id="btn-restart">重新開始 🔄</button>
        <div class="level-indicator" id="level-title">第 1 / 20 關</div>
    </header>

    <div id="sudoku-grid"></div>

    <div id="toolbar">
        <div class="tool-item" draggable="true" data-value="1">
            <div class="graphic-box box-1">
                <span class="box-emoji">⭐</span><span class="box-label">信</span>
                <img src="Asset 13.png" alt="信" onerror="this.style.display='none';">
            </div>
        </div>
        <div class="tool-item" draggable="true" data-value="2">
            <div class="graphic-box box-2">
                <span class="box-emoji">☀️</span><span class="box-label">望</span>
                <img src="Asset 11.png" alt="望" onerror="this.style.display='none';">
            </div>
        </div>
        <div class="tool-item" draggable="true" data-value="3">
            <div class="graphic-box box-3">
                <span class="box-emoji">🌙</span><span class="box-label">愛</span>
                <img src="Asset 8.png" alt="愛" onerror="this.style.display='none';">
            </div>
        </div>
        <div class="tool-item" draggable="true" data-value="4">
            <div class="graphic-box box-4">
                <span class="box-emoji">🌍</span><span class="box-label">真</span>
                <img src="Asset 17.png" alt="真" onerror="this.style.display='none';">
            </div>
        </div>
        <div class="tool-item eraser" draggable="true" data-value="0">
            <div class="graphic-box">
                <span class="box-emoji" style="font-size:1.4rem;">❌</span><span class="box-label" style="font-size:0.8rem;">擦除</span>
            </div>
        </div>
    </div>
    
    <p class="hint-text">💡 拖曳圖案，或「先點圖案再點空格」都能填空喔！</p>

    <div id="win-overlay" class="overlay">
        <div class="overlay-title win-title" id="win-message">太棒了！<br>你全部答對了！ 🎉👏</div>
        <button class="btn-next" id="btn-next">下一關 ➡️</button>
    </div>

    <div id="encourage-overlay" class="overlay">
        <div class="overlay-title encourage-title">不正確，再檢查一下吧！ 💪</div>
        <button class="btn-try-again" id="btn-try-again">繼續努力 🛠️</button>
    </div>
</div>

<script>
    const IMAGES = { 1: 'Asset 13.png', 2: 'Asset 11.png', 3: 'Asset 8.png', 4: 'Asset 17.png' };
    const LABELS = {
        1: { text: '信', emoji: '⭐' },
        2: { text: '望', emoji: '☀️' },
        3: { text: '愛', emoji: '🌙' },
        4: { text: '真', emoji: '🌍' }
    };

    const LEVELS = [
        { initial: [0, 1, 2, 3, 2, 0, 0, 1, 0, 0, 3, 4, 0, 4, 0, 0] },
        { initial: [1, 0, 3, 0, 0, 2, 1, 4, 4, 3, 0, 0, 2, 0, 4, 3] },
        { initial: [4, 0, 2, 0, 0, 3, 4, 1, 1, 2, 0, 0, 0, 4, 1, 2] },
        { initial: [1, 4, 0, 2, 3, 0, 0, 4, 0, 3, 2, 0, 2, 0, 4, 0] },
        { initial: [0, 1, 3, 0, 2, 0, 4, 1, 1, 0, 0, 4, 3, 4, 0, 0] },
        { initial: [2, 0, 4, 1, 0, 1, 2, 0, 3, 4, 0, 0, 0, 2, 3, 4] },
        { initial: [0, 3, 4, 0, 4, 0, 0, 3, 3, 4, 1, 0, 1, 0, 3, 4] },
        { initial: [4, 1, 0, 0, 2, 0, 0, 1, 0, 2, 3, 0, 3, 0, 0, 2] },
        { initial: [0, 4, 3, 0, 3, 0, 0, 4, 4, 3, 0, 0, 0, 1, 4, 3] },
        { initial: [2, 3, 0, 0, 0, 0, 2, 3, 3, 4, 1, 0, 0, 2, 0, 4] },
        { initial: [3, 0, 1, 2, 0, 2, 0, 0, 2, 3, 4, 0, 0, 0, 0, 3] },
        { initial: [0, 4, 1, 0, 1, 0, 0, 4, 2, 0, 4, 1, 0, 1, 0, 0] },
        { initial: [4, 0, 2, 0, 0, 3, 0, 0, 1, 0, 3, 0, 0, 4, 0, 2] },
        { initial: [0, 4, 0, 2, 3, 0, 1, 0, 0, 3, 0, 0, 2, 0, 4, 3] },
        { initial: [2, 0, 4, 0, 4, 1, 0, 0, 0, 0, 1, 2, 0, 2, 0, 0] },
        { initial: [3, 4, 0, 0, 0, 0, 3, 4, 2, 0, 0, 1, 0, 1, 2, 0] },
        { initial: [0, 1, 2, 3, 0, 0, 0, 1, 1, 0, 0, 0, 3, 4, 0, 0] },
        { initial: [1, 0, 3, 0, 0, 2, 0, 4, 4, 0, 0, 0, 0, 0, 4, 3] },
        { initial: [2, 3, 0, 0, 0, 1, 2, 0, 0, 0, 1, 2, 0, 0, 3, 0] },
        { initial: [3, 0, 0, 2, 1, 2, 0, 0, 0, 0, 4, 1, 0, 1, 0, 0] }
    ];

    let currentLevelIndex = 0;
    let currentGrid = [];
    let draggedValue = null;
    let selectedValue = null;

    const gridElement = document.getElementById('sudoku-grid');
    const levelTitle = document.getElementById('level-title');
    const winOverlay = document.getElementById('win-overlay');
    const encourageOverlay = document.getElementById('encourage-overlay');
    const winMessage = document.getElementById('win-message');
    const btnNext = document.getElementById('btn-next');
    const btnTryAgain = document.getElementById('btn-try-again');
    const btnRestart = document.getElementById('btn-restart');
    const toolItems = document.querySelectorAll('.tool-item');

    function initLevel(index) {
        currentLevelIndex = index;
        levelTitle.textContent = `第 ${currentLevelIndex + 1} / ${LEVELS.length} 關`;
        winOverlay.classList.remove('show');
        encourageOverlay.classList.remove('show');
        
        toolItems.forEach(i => i.classList.remove('active-selected'));
        selectedValue = null;

        currentGrid = [...LEVELS[currentLevelIndex].initial];
        gridElement.innerHTML = '';

        for (let i = 0; i < 16; i++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            cell.dataset.index = i;
            cell.dataset.row = Math.floor(i / 4);
            cell.dataset.col = i % 4;

            const initialValue = currentGrid[i];
            if (initialValue !== 0) {
                cell.classList.add('locked');
                createGraphicCard(cell, initialValue);
            } else {
                setupCellEvents(cell);
            }
            gridElement.appendChild(cell);
        }
    }

    function createGraphicCard(container, value) {
        container.innerHTML = '';
        if (value === 0) return;

        const box = document.createElement('div');
        box.className = `graphic-box box-${value}`;

        const emoji = document.createElement('span');
        emoji.className = 'box-emoji';
        emoji.textContent = LABELS[value].emoji;

        const label = document.createElement('span');
        label.className = 'box-label';
        label.textContent = LABELS[value].text;

        const img = document.createElement('img');
        img.src = IMAGES[value];
        img.alt = LABELS[value].text;
        img.onerror = function() { this.remove(); };

        box.appendChild(emoji);
        box.appendChild(label);
        box.appendChild(img);
        container.appendChild(box);
    }

    function setupCellEvents(cell) {
        cell.addEventListener('dragover', (e) => { e.preventDefault(); cell.classList.add('drag-hover'); });
        cell.addEventListener('dragleave', () => { cell.classList.remove('drag-hover'); });
        cell.addEventListener('drop', (e) => {
            e.preventDefault();
            cell.classList.remove('drag-hover');
            if (draggedValue !== null) fillCell(cell, draggedValue);
        });

        cell.addEventListener('click', (e) => {
            e.stopPropagation();
            if (selectedValue !== null) fillCell(cell, selectedValue);
        });
    }

    function fillCell(cell, value) {
        const idx = parseInt(cell.dataset.index);
        currentGrid[idx] = value;
        createGraphicCard(cell, value);

        // 💡 每次填入後，檢查畫面係咪已經填滿
        let isBoardFull = true;
        for (let i = 0; i < 16; i++) {
            if (currentGrid[i] === 0) {
                isBoardFull = false;
                break;
            }
        }

        // 如果填滿咗，就進行對錯判斷
        if (isBoardFull) {
            if (checkWin()) {
                showWinCelebration();
            } else {
                // 如果填滿但錯咗，就彈出鼓勵視窗
                encourageOverlay.classList.add('show');
            }
        }
    }

    toolItems.forEach(item => {
        item.addEventListener('dragstart', () => {
            draggedValue = parseInt(item.dataset.value);
            item.classList.add('dragging');
        });

        item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
            draggedValue = null;
        });

        item.addEventListener('click', (e) => {
            e.stopPropagation();
            if (item.classList.contains('active-selected')) {
                item.classList.remove('active-selected');
                selectedValue = null;
            } else {
                toolItems.forEach(i => i.classList.remove('active-selected'));
                item.classList.add('active-selected');
                selectedValue = parseInt(item.dataset.value);
            }
        });
    });

    function checkWin() {
        for (let i = 0; i < 16; i++) if (currentGrid[i] === 0) return false;

        for (let row = 0; row < 4; row++) {
            let set = new Set();
            for (let col = 0; col < 4; col++) set.add(currentGrid[row * 4 + col]);
            if (set.size !== 4) return false;
        }

        for (let col = 0; col < 4; col++) {
            let set = new Set();
            for (let row = 0; row < 4; row++) set.add(currentGrid[row * 4 + col]);
            if (set.size !== 4) return false;
        }

        const blocks = [[0,1,4,5], [2,3,6,7], [8,9,12,13], [10,11,14,15]];
        for (let b = 0; b < 4; b++) {
            let set = new Set();
            for (let idx of blocks[b]) set.add(currentGrid[idx]);
            if (set.size !== 4) return false;
        }

        return true;
    }

    function showWinCelebration() {
        if (currentLevelIndex === LEVELS.length - 1) {
            winMessage.innerHTML = "🏆 太厲害了！<br>你通過了所有關卡！";
            btnNext.textContent = "再玩一次 🔁";
        } else {
            winMessage.innerHTML = "太棒了！<br>你全部答對了！ 🎉👏";
            btnNext.textContent = "下一關 ➡️";
        }
        winOverlay.classList.add('show');
    }

    // 💡 點擊「繼續努力」，隱藏鼓勵彈窗，畀小朋友繼續修改
    btnTryAgain.addEventListener('click', () => {
        encourageOverlay.classList.remove('show');
    });

    btnNext.addEventListener('click', () => {
        if (currentLevelIndex === LEVELS.length - 1) initLevel(0);
        else initLevel(currentLevelIndex + 1);
    });

    btnRestart.addEventListener('click', () => initLevel(currentLevelIndex));

    document.body.addEventListener('click', () => {
        toolItems.forEach(i => i.classList.remove('active-selected'));
        selectedValue = null;
    });

    initLevel(0);

    // ==========================================
    // 新增：自動縮放畫面以適應不同裝置螢幕 (iPad/手機)
    // ==========================================
    function autoScale() {
        const container = document.getElementById('game-container');
        // 先暫時重置 transform 以取得原本正確的原始尺寸
        container.style.transform = 'none';
        
        // 取得視窗可用寬度與高度 (並扣除一些安全邊距)
        const margin = 30; 
        const scaleWidth = window.innerWidth / (container.offsetWidth + margin);
        const scaleHeight = window.innerHeight / (container.offsetHeight + margin);
        
        // 取得最佳的縮放比例，確保不會超出畫面。最大不超過 1（保留原始大小不強制放大）
        const scale = Math.min(scaleWidth, scaleHeight, 1);
        
        // 將算出的比例應用到遊戲容器上
        container.style.transform = `scale(${scale})`;
        container.style.transformOrigin = 'center center';
    }

    // 監聽視窗大小改變與螢幕旋轉事件，即時更新畫面縮放
    window.addEventListener('resize', autoScale);
    window.addEventListener('orientationchange', autoScale);
    
    // 遊戲初始化後執行一次自動縮放
    autoScale();

</script>

</body>
</html>
